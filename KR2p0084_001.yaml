body:
  text: 王適古邑之行楚邦少安君王焉先居災巢亂之上以觀師徒焉命師徒殺取禽獸雉兔師徒乃亂不動之於後以遌王卒三鼓乃行深入王卒不止遂鼓乃行君王喜之焉命陳公狂止之陳公狂既聽命乃逝整師徒陳公乃就軍執事人君魯又復於君王以逞師徒師徒皆懼乃各得其行復聽命於君王君王不知臣之無才命臣相執事人整師徒不知進師啓極於王所而止師徒乎不知其啓卒陵行遂內王卒而毋止師徒乎王謂陳公如內王卒而毋止師徒毋亦善乎陳公此君王不知狂之無才命狂相執事人整師徒執事人必善命之命相輔轅挾車五人於伍十人於行行列不成隊率隊命從廢小人將車為主焉又持八鼓五爯鉦鐃以左錞于以右金鐸以坐木鐸以起鼓以進之鼙以止之烈以臧士喬山以退之有所謂威有所謂恭有所謂卻有所謂一有所謂專陳公狂焉坐楚邦之故戰於蔡湫咎師不絶酓熊雪子皮與巴人戰於鴼州師不絶焉得其猿旗屈甹與巴命尹戰於息戰而持之先君武王與鄖人戰於蒲寞師不絶先君文王戰於塗漳之滸師不絶又與晉人戰於兩棠師不絶如既至於仇人之間將出師既斯移軍左右司馬進於將軍命出師徒將軍乃許諾左右司馬之師徒乃出背軍而陳將軍後出焉名之弇行如閟如逆閟如關術如攻隊如御追必慎簷徒周其徒衛如既堞城焉陳兩和而紉之必慎簡陳於阜岡陵岡則鴈飛陳於埸野深草霜露車則簡徒甲居後陳於障則徒甲進退
